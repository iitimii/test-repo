<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      max-width: 700px;
    }

    .emoji { font-size: 72px; margin-bottom: 20px; display: block; }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #e94560, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .tags {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .tag {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .tag-pink   { background: rgba(233, 69, 96, 0.2);  border: 1px solid rgba(233, 69, 96, 0.5);  color: #e94560; }
    .tag-purple { background: rgba(168, 85, 247, 0.2); border: 1px solid rgba(168, 85, 247, 0.5); color: #a855f7; }
    .tag-blue   { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.5); color: #3b82f6; }

    .cta {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(90deg, #e94560, #a855f7);
      border-radius: 999px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(233, 69, 96, 0.5);
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🚀</span>
    <h1>Hello, World!</h1>
    <p>A beautifully crafted simple webpage — built, screenshotted, and uploaded automatically.</p>
    <div class="tags">
      <span class="tag tag-pink">HTML</span>
      <span class="tag tag-purple">CSS</span>
      <span class="tag tag-blue">Open Source</span>
    </div>
    <a href="#" class="cta">Get Started</a>
    <footer>Built with ❤️ and Oz · 2026</footer>
  </div>
</body>
</html>
